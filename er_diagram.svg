<svg width="920" height="640" viewBox="0 0 920 640" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="920" height="640" fill="#ffffff"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ================= Connectors (drawn first, behind boxes) ================= -->
  <g fill="none" stroke="#8A8A85" stroke-width="1.3">
    <path d="M360,110 L145,110 L145,280"/>
    <path d="M560,140 L775,140 L775,280"/>
    <path d="M360,160 L20,160 L20,520 L40,520"/>
    <path d="M560,80  L900,80  L900,540 L880,540"/>
    <path d="M775,416 L775,500"/>
  </g>

  <g font-size="12" fill="#444441">
    <rect x="222" y="188" width="42" height="16" fill="#ffffff"/>
    <text x="243" y="200" text-anchor="middle">1 : 1</text>

    <rect x="740" y="188" width="46" height="16" fill="#ffffff"/>
    <text x="763" y="200" text-anchor="middle">1 : N</text>

    <rect x="0"   y="330" width="46" height="16" fill="#ffffff"/>
    <text x="23"  y="342" text-anchor="middle">M : N</text>
    <rect x="0"   y="346" width="80" height="14" fill="#ffffff"/>
    <text x="10"  y="357" font-size="10" text-anchor="start">(self-relation)</text>

    <rect x="878" y="290" width="42" height="16" fill="#ffffff"/>
    <text x="899" y="302" text-anchor="middle">1 : N</text>

    <rect x="750" y="450" width="46" height="16" fill="#ffffff"/>
    <text x="773" y="462" text-anchor="middle">1 : N</text>
  </g>

  <!-- ================= Users ================= -->
  <g>
    <rect x="360" y="30" width="200" height="136" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
    <rect x="360" y="30" width="200" height="30" rx="6" fill="#185FA5"/>
    <rect x="360" y="48" width="200" height="12" fill="#185FA5"/>
    <text x="460" y="50" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">Users</text>
    <text x="374" y="82"  font-size="12" fill="#042C53" font-weight="600">user_id</text>
    <text x="546" y="82"  font-size="11" text-anchor="end" fill="#0C447C">PK</text>
    <text x="374" y="106" font-size="12" fill="#042C53">email</text>
    <text x="374" y="130" font-size="12" fill="#042C53">password (BINARY 64, MD5)</text>
    <text x="374" y="154" font-size="12" fill="#042C53">created_at</text>
    <line x1="360" y1="94" x2="560" y2="94" stroke="#185FA5" stroke-width="0.5"/>
  </g>

  <!-- ================= Profiles ================= -->
  <g>
    <rect x="40" y="280" width="210" height="136" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
    <rect x="40" y="280" width="210" height="30" rx="6" fill="#0F6E56"/>
    <rect x="40" y="298" width="210" height="12" fill="#0F6E56"/>
    <text x="145" y="300" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">Profiles</text>
    <text x="54" y="332" font-size="12" fill="#04342C" font-weight="600">profile_id</text>
    <text x="236" y="332" font-size="11" text-anchor="end" fill="#085041">PK</text>
    <text x="54" y="356" font-size="12" fill="#04342C">user_id</text>
    <text x="236" y="356" font-size="11" text-anchor="end" fill="#085041">FK</text>
    <text x="54" y="380" font-size="12" fill="#04342C">username</text>
    <text x="54" y="404" font-size="12" fill="#04342C">bio</text>
    <line x1="40" y1="344" x2="250" y2="344" stroke="#0F6E56" stroke-width="0.5"/>
  </g>

  <!-- ================= Tweets ================= -->
  <g>
    <rect x="670" y="280" width="210" height="136" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
    <rect x="670" y="280" width="210" height="30" rx="6" fill="#993C1D"/>
    <rect x="670" y="298" width="210" height="12" fill="#993C1D"/>
    <text x="775" y="300" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">Tweets</text>
    <text x="684" y="332" font-size="12" fill="#4A1B0C" font-weight="600">tweet_id</text>
    <text x="866" y="332" font-size="11" text-anchor="end" fill="#712B13">PK</text>
    <text x="684" y="356" font-size="12" fill="#4A1B0C">user_id</text>
    <text x="866" y="356" font-size="11" text-anchor="end" fill="#712B13">FK</text>
    <text x="684" y="380" font-size="12" fill="#4A1B0C">content (VARCHAR 280)</text>
    <text x="684" y="404" font-size="12" fill="#4A1B0C">created_at</text>
    <line x1="670" y1="344" x2="880" y2="344" stroke="#993C1D" stroke-width="0.5"/>
  </g>

  <!-- ================= Follows ================= -->
  <g>
    <rect x="40" y="500" width="230" height="110" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
    <rect x="40" y="500" width="230" height="30" rx="6" fill="#5F5E5A"/>
    <rect x="40" y="518" width="230" height="12" fill="#5F5E5A"/>
    <text x="155" y="520" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">Follows</text>
    <text x="54" y="552" font-size="12" fill="#2C2C2A" font-weight="600">follower_id</text>
    <text x="256" y="552" font-size="11" text-anchor="end" fill="#444441">PK, FK</text>
    <text x="54" y="576" font-size="12" fill="#2C2C2A" font-weight="600">followed_id</text>
    <text x="256" y="576" font-size="11" text-anchor="end" fill="#444441">PK, FK</text>
    <text x="54" y="600" font-size="12" fill="#2C2C2A">followed_at</text>
  </g>

  <!-- ================= Likes ================= -->
  <g>
    <rect x="670" y="500" width="210" height="110" rx="6" fill="#FBEAF0" stroke="#993556" stroke-width="1"/>
    <rect x="670" y="500" width="210" height="30" rx="6" fill="#993556"/>
    <rect x="670" y="518" width="210" height="12" fill="#993556"/>
    <text x="775" y="520" text-anchor="middle" font-size="14" font-weight="600" fill="#ffffff">Likes</text>
    <text x="684" y="552" font-size="12" fill="#4B1528" font-weight="600">user_id</text>
    <text x="866" y="552" font-size="11" text-anchor="end" fill="#72243E">PK, FK</text>
    <text x="684" y="576" font-size="12" fill="#4B1528" font-weight="600">tweet_id</text>
    <text x="866" y="576" font-size="11" text-anchor="end" fill="#72243E">PK, FK</text>
    <text x="684" y="600" font-size="12" fill="#4B1528">liked_at</text>
  </g>

  <!-- Title -->
  <text x="20" y="20" font-size="13" fill="#888780">MicroBlogDB — Entity Relationship Diagram</text>
</svg>
